<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QMS Alertas</title>

<style>

/* ===== BASE ===== */
body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#eef1f5;
font-size:16px;
}

/* ===== HEADER ===== */
header{
background:#1e293b;
color:white;
padding:16px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
font-size:18px;
}

header button{
background:#22c55e;
padding:12px 16px;
border:none;
border-radius:10px;
color:white;
font-size:16px;
}

/* ===== TOOLBAR ===== */
.toolbar{
display:flex;
gap:10px;
padding:12px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.toolbar input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.toolbar button{
padding:12px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
font-size:16px;
}

/* ===== CONTENIDO ===== */
.container{padding:12px;}

/* ===== TARJETAS ===== */
.card{
background:white;
padding:16px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
font-size:16px;
}

.card button{
width:100%;
margin-top:10px;
background:#2563eb;
color:white;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
}

.activa{border-left:6px solid #22c55e;}
.proxima{border-left:6px solid #f59e0b;}
.vencida{border-left:6px solid #ef4444;}

.badge{
display:inline-block;
margin-top:6px;
font-size:13px;
padding:6px 10px;
border-radius:8px;
color:white;
}

.badge.activa{background:#22c55e;}
.badge.proxima{background:#f59e0b;}
.badge.vencida{background:#ef4444;}

/* ===== MODAL PRO ===== */
.modal{
display:none;
position:fixed;
bottom:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.modal-content{
position:absolute;
bottom:0;
width:100%;
background:white;
padding:20px;
border-radius:20px 20px 0 0;
max-height:90%;
overflow:auto;
}

.modal-content h3{
margin-top:0;
font-size:20px;
}

.modal-content input{
padding:14px;
font-size:16px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ccc;
width:100%;
}

.modal-content button{
width:100%;
padding:14px;
font-size:16px;
margin-top:8px;
border:none;
border-radius:10px;
}

.modal-content button:first-of-type{
background:#16a34a;
color:white;
}

.modal-content button:last-of-type{
background:#dc2626;
color:white;
}

/* ===== VISOR ===== */
.viewer{
width:100%;
height:100vh;
background:#e5e7eb;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
}

.viewer-content{
background:white;
padding:10px;
border-radius:12px;
max-width:95%;
max-height:95%;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* 🔥 IMAGEN HD */
.viewer img{
max-width:100%;
max-height:90vh;
object-fit:contain;
image-rendering:auto;
}

/* WATERMARK */
.watermark{
position:absolute;
font-size:60px;
color:red;
opacity:0.15;
transform:rotate(-20deg);
}

/* BOTÓN SALIR */
.btn-salir{
position:fixed;
top:10px;
left:10px;
background:#1e293b;
color:white;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
}

</style>
</head>

<body>

<header>
<div>📊 QMS Alertas</div>
<button onclick="abrirModal()">+ Nueva</button>
</header>

<div class="toolbar">
<input type="text" id="busqueda" placeholder="🔍 Buscar alerta...">
<button onclick="ordenar()">Ordenar</button>
</div>

<div class="container" id="pantallaLista">
<div id="lista"></div>
</div>

<!-- VISOR -->
<div id="pantallaViewer" style="display:none;">
<button class="btn-salir" onclick="volver()">⬅</button>

<div class="viewer">
<div class="viewer-content">
<img id="imagenVista">
<div id="marca" class="watermark"></div>
</div>
</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Registrar alerta</h3>

<input id="noAlerta" placeholder="No alerta">
<input id="parte" placeholder="No parte">
<input type="date" id="fechaExp">
<input type="file" id="img" accept="image/*">

<button onclick="guardar()">Guardar alerta</button>
<button onclick="cerrarModal()">Cancelar</button>

</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCF8LqahGUkhN7ddsi8bNmYiruaiiT2cFM",
  authDomain: "qa-qms.firebaseapp.com",
  projectId: "qa-qms",
  storageBucket: "qa-qms.firebasestorage.app",
  messagingSenderId: "526116480194",
  appId: "1:526116480194:web:d97830dbe49c496834875b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let alertas = [];
let asc=true;

function estado(fecha){
let hoy=new Date();
let exp=new Date(fecha);
let diff=(exp-hoy)/(1000*60*60*24);
if(diff<0) return "vencida";
if(diff<=3) return "proxima";
return "activa";
}

window.abrirModal = ()=> modal.style.display="block";
window.cerrarModal = ()=> modal.style.display="none";

function toBase64(file){
return new Promise(res=>{
let r=new FileReader();
r.onload=()=>res(r.result);
r.readAsDataURL(file);
});
}

window.guardar = async function(){

let base64="";

if(img.files[0]){
base64 = await toBase64(img.files[0]);
}

await addDoc(collection(db,"alertas"),{
no:noAlerta.value,
parte:parte.value,
exp:fechaExp.value,
img:base64
});

cerrarModal();
cargarAlertas();
}

async function cargarAlertas(){

alertas=[];

let snapshot = await getDocs(collection(db,"alertas"));

snapshot.forEach(doc=>{
let a = doc.data();
a.id = doc.id;
alertas.push(a);
});

render();
}

window.ordenar = function(){
asc=!asc;
alertas.sort((a,b)=> asc ? new Date(a.exp)-new Date(b.exp) : new Date(b.exp)-new Date(a.exp));
render();
}

function render(){

let texto=busqueda.value.toLowerCase();

lista.innerHTML="";

alertas
.filter(a=>a.no.toLowerCase().includes(texto)||a.parte.toLowerCase().includes(texto))
.forEach(a=>{

let e=estado(a.exp);

lista.innerHTML+=`
<div class="card ${e}">
<b>${a.no}</b><br>
Parte: ${a.parte}<br>
Vence: ${a.exp}<br>
<span class="badge ${e}">${e}</span>
<button onclick="ver('${a.id}')">Ver alerta</button>
</div>
`;
});
}

window.ver = function(id){

let a = alertas.find(x=>x.id===id);

pantallaLista.style.display="none";
pantallaViewer.style.display="block";

imagenVista.src=a.img;
marca.innerText = estado(a.exp)==="vencida" ? "VENCIDA" : "";
}

window.volver = function(){
pantallaLista.style.display="block";
pantallaViewer.style.display="none";
}

busqueda.addEventListener("input",render);

cargarAlertas();

</script>

</body>
</html>
